<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Family Recipe Vault</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
:root{--bg:#F8F2EC;--bg-card:#fff;--bg-muted:#f3ede6;--bg-hover:#ede7e0;--border:#e2dbd2;--border-light:#ede7e0;--text:#181818;--text-muted:#888;--text-faint:#bbb;--accent:#181818;--radius-sm:6px;--radius:10px;--radius-lg:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{max-width:960px;margin:0 auto;padding:2.5rem 1.25rem}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:12px;flex-wrap:wrap;padding-bottom:1.5rem;border-bottom:1px solid var(--border-light)}
h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;letter-spacing:.01em;display:flex;align-items:center;gap:10px;color:var(--text)}
h1 i{font-size:22px;opacity:.5}

/* Buttons */
.btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;font-family:'Inter',inherit;letter-spacing:.01em}
.btn:hover{background:var(--bg-hover);border-color:#aaa}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.82}

/* Filter pills */
.filters{margin-bottom:1.75rem}
.pill{padding:5px 16px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text-muted);transition:all .15s;font-family:'Inter',inherit;letter-spacing:.03em;font-weight:500}
.pill:hover{border-color:#999;color:var(--text)}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s}
.card:hover{border-color:#c8bfb5;box-shadow:0 4px 18px rgba(0,0,0,.07);transform:translateY(-1px)}
.card-img-wrap{width:100%;height:200px;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:38px;overflow:hidden}
.card-img-wrap img{width:100%;height:200px;object-fit:cover;display:block;object-position:center 30%}
.card-body{padding:14px 16px}
.card-body h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:3px;line-height:1.3;color:var(--text)}
.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.source{font-size:11px;color:var(--text-faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Tags */
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.tag-breakfast{background:#FAEEDA;color:#633806}
.tag-lunch{background:#EAF3DE;color:#27500A}
.tag-dinner{background:#E6F1FB;color:#0C447C}
.tag-snack{background:#FBEAF0;color:#72243E}
.tag-dessert{background:#EEEDFE;color:#3C3489}
.tag-drink{background:#E1F5EE;color:#085041}
.tag-default{background:var(--bg-muted);color:#666}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(24,24,24,.52);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border-light);width:100%;max-width:660px;overflow:hidden;position:relative;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal-img-wrap{width:100%;height:280px;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;font-size:52px;color:var(--text-faint);overflow:hidden}
.modal-img-wrap img{width:100%;height:280px;object-fit:cover;display:block;object-position:center 25%}
.modal-body{padding:1.6rem}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;margin-bottom:.2rem;line-height:1.2;letter-spacing:.01em}
.modal-source{font-size:12px;color:var(--text-faint);margin-bottom:1rem}
.modal-source a{color:#185FA5;text-decoration:none}
.modal-source a:hover{text-decoration:underline}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:.7rem;margin-top:1.4rem}
.controls-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:.5rem;padding:10px 0;border-top:1px solid var(--border-light);border-bottom:1px solid var(--border-light);margin-top:.75rem}
.unit-toggle{display:flex;gap:4px}
.toggle-btn{padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'Inter',inherit;letter-spacing:.01em}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.serv-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted)}
.serv-row .sc-btn{padding:2px 10px;font-size:16px;line-height:1.4}
.serv-val{font-size:14px;font-weight:500;color:var(--text);min-width:22px;text-align:center}
.ing-list{list-style:none}
.ing-list li{padding:8px 0;border-bottom:1px solid var(--border-light);font-size:14px;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.ing-list li:last-child{border:none}
.ing-name{color:var(--text)}
.ing-amt{color:var(--text-muted);font-size:13px;white-space:nowrap}
.ing-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);padding:12px 0 4px;border:none!important;display:block}
.inst-list{list-style:none}
.inst-list li{padding:11px 0;border-bottom:1px solid var(--border-light);font-size:14px;line-height:1.7;display:flex;gap:14px}
.inst-list li:last-child{border:none}
.step-num{font-size:11px;font-weight:700;color:var(--text-faint);min-width:18px;padding-top:3px;flex-shrink:0;letter-spacing:.03em}
.close-btn{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-muted);z-index:10;backdrop-filter:blur(4px)}
.close-btn:hover{background:#fff;color:var(--text)}

/* Shopping list modal */
.shop-modal-bg{position:fixed;inset:0;background:rgba(24,24,24,.55);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;z-index:200;backdrop-filter:blur(2px)}
.shop-modal{background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border-light);width:100%;max-width:560px;overflow:hidden;position:relative;margin:auto;padding:1.75rem;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.shop-modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:1.25rem}
.shop-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:1.1rem 0 .4rem}
.shop-ing-list{list-style:none;margin-bottom:.5rem}
.shop-ing-list li{font-size:14px;padding:6px 0;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;gap:8px}
.shop-ing-list li:last-child{border:none}
.shop-close{position:absolute;top:12px;right:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text-muted)}
.shop-close:hover{background:var(--bg-muted)}

/* Cook log */
.log-section{border-top:1px solid var(--border-light);margin-top:1.5rem;padding-top:1.25rem}
.log-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:8px}
.last-cooked{font-size:13px;color:var(--text-muted)}
.last-cooked strong{color:var(--text)}
.family-ratings{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.rating-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-muted);border-radius:var(--radius-sm);padding:8px 12px}
.rating-name{font-size:13px;font-weight:500;color:var(--text)}
.rating-btns{display:flex;gap:4px}
.rating-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;font-size:15px;cursor:pointer;transition:all .15s;line-height:1}
.rating-btn.selected{border-color:var(--accent);background:var(--accent)}
.comments-list{list-style:none;margin-bottom:.75rem}
.comments-list li{font-size:13px;padding:8px 0;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column;gap:3px}
.comments-list li:last-child{border:none}
.comment-meta{font-size:11px;color:var(--text-faint)}
.comment-input-row{display:flex;gap:8px}
.comment-input-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-family:'Inter',inherit;outline:none;background:var(--bg-card);color:var(--text)}
.comment-input-row input:focus{border-color:#999}
.cook-dates{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.85rem}
.cook-date-chip{font-size:11px;background:var(--bg-muted);border-radius:10px;padding:2px 9px;color:var(--text-muted)}
.nutrition-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.5rem}
.nutrition-cell{background:var(--bg-muted);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.nutrition-val{font-size:16px;font-weight:500;color:var(--text);display:block;line-height:1.2}
.nutrition-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-top:2px;display:block}

/* Add form */
.add-form{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1.6rem;margin-bottom:1.75rem;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.add-form-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;margin-bottom:1.1rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:14px;font-family:'Inter',inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:#999}
.field textarea{resize:vertical;line-height:1.55}
.form-row{display:flex;gap:10px}
.form-row .field{flex:1}
.empty{text-align:center;padding:3.5rem;color:var(--text-faint);font-size:15px}
.hint{font-size:11px;color:var(--text-faint);margin-top:5px}
/* Commit + history */
.commit-btn{background:#181818;color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 18px;font-size:13px;font-family:'Inter',inherit;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .15s}
.commit-btn:hover{opacity:.82}
.commit-btn.committed{background:#0A5C2E;cursor:default}
.history-panel{margin-top:1.5rem;border-top:1px solid var(--border-light);padding-top:1.25rem}
.history-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:1rem}
.history-week{border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.history-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg-card)}
.history-week-header:hover{background:var(--bg-muted)}
.history-week-label{font-size:13px;font-weight:500}
.history-week-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:10px}
.history-week-badge.committed{background:#D6F0E0;color:#0A5C2E}
.history-week-badge.draft{background:var(--bg-muted);color:var(--text-faint)}
.history-week-body{padding:10px 14px;border-top:1px solid var(--border-light);display:none;background:var(--bg-card)}
.history-week-body.open{display:block}
.history-meal-row{font-size:13px;padding:4px 0;display:flex;gap:8px}
.history-meal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);min-width:48px;padding-top:2px}
/* Cook timeline */
.cook-timeline{list-style:none;margin-top:.5rem}
.cook-timeline li{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.cook-timeline li:last-child{border:none}
.cook-timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cook-timeline-date{color:var(--text);font-weight:500}
.cook-timeline-note{color:var(--text-faint);font-size:11px}
/* Search */
.filter-search-wrap{position:relative;margin-bottom:10px}
.filter-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:14px}
.filter-search{width:100%;padding:8px 32px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:14px;font-family:'Inter',inherit;outline:none}
.filter-search:focus{border-color:#999}
.filter-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:13px;padding:4px}
/* Filter rows */
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.filter-row-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);min-width:52px;flex-shrink:0}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
/* Card plan button */
.card-plan-row{margin-top:10px;border-top:1px solid var(--border-light);padding-top:8px}
.add-to-week-btn{background:none;border:none;font-size:12px;color:var(--text-faint);cursor:pointer;padding:0;font-family:'Inter',inherit;display:flex;align-items:center;gap:5px;transition:color .15s}
.add-to-week-btn:hover{color:var(--text)}
.plan-popover{display:flex;flex-direction:column;gap:4px}
.plan-popover-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:2px}
.plan-pop-btn{background:var(--bg-muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text);font-family:'Inter',inherit;text-align:left;display:flex;align-items:center;gap:6px;transition:background .15s}
.plan-pop-btn:hover{background:var(--bg-hover)}
/* Planned badge */
.planned-badge{font-size:10px;font-weight:600;color:#0A5C2E;background:#D6F0E0;border-radius:10px;padding:2px 8px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:3px}

/* Planner */
.planner{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1.6rem;margin-bottom:1.75rem;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.planner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.planner-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500}
.planner-week{font-size:12px;color:var(--text-faint);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.planner-section{margin-bottom:1.4rem}
.planner-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:.75rem}
.planner-section-note{font-size:11px;color:var(--text-faint);margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0}
.plan-slots{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.plan-slot{display:flex;flex-direction:column;gap:4px}
.plan-slot-label{font-size:11px;color:var(--text-muted);font-weight:500}
.plan-slot select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:13px;font-family:'Inter',inherit;outline:none;cursor:pointer}
.plan-slot select:focus{border-color:#999}
.planner-actions{display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap}
.plan-shop-list{margin-top:1.25rem;border-top:1px solid var(--border-light);padding-top:1.25rem}
.plan-shop-title{font-size:13px;font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between}
.plan-shop-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:.9rem 0 .3rem}
.plan-shop-items{list-style:none}
.plan-shop-items li{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;gap:8px}
.plan-shop-items li:last-child{border:none}
.ac-wrap{position:relative}
.ac-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:13px;font-family:'Inter',inherit;outline:none}
.ac-input:focus{border-color:#999}
.ac-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;max-height:200px;overflow-y:auto;margin-top:2px}
.ac-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border-light)}
.ac-item:last-child{border:none}
.ac-item:hover,.ac-item.active{background:var(--bg-muted)}
.ac-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-faint);font-size:14px;padding:2px 4px}
.plan-row{background:var(--bg-muted);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.plan-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-row-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text)}
.plan-row-body{display:flex;gap:12px}
.plan-row-body select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-size:13px;font-family:'Inter',inherit;outline:none}
.plan-row-body select:focus{border-color:#999}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><i class="ti ti-book-2"></i> West Family Recipe Vault</h1>
    <div style="display:flex;gap:8px"><button class="btn" onclick="openHistory()"><i class="ti ti-clock-history"></i> History</button><button class="btn" onclick="openPlanner()"><i class="ti ti-calendar-week"></i> Meal planner</button><button class="btn primary" onclick="openAdd()"><i class="ti ti-plus"></i> Add recipe</button></div>
  </div>
  <div class="filters" id="filters"></div>
  <div id="planner-area"></div>
  <div id="history-area"></div>
  <div id="add-form-area"></div>
  <div class="grid" id="grid"></div>
  <div id="modal-area"></div>
  <div id="shop-modal-area"></div>
</div>

<script>
const CATEGORIES = ['all','breakfast','lunch','dinner','snack','dessert','drink'];
const BREAKFAST_KW = ['egg','pancake','waffle','oatmeal','toast','bagel','muffin','frittata','omelet','granola','french toast','biscuit','scone','smoothie bowl','porridge','cereal','crepe','quiche'];
const LUNCH_KW = ['sandwich','wrap','salad','soup','quesadilla','panini','bowl','pita','taco','burger','club','blt','ramen','pho','sushi'];
const DINNER_KW = ['chicken','beef','pasta','steak','roast','salmon','shrimp','pork','lamb','casserole','stew','curry','risotto','lasagna','bake','grilled','chili','fillet','tenderloin','cod','tilapia','turkey'];
const SNACK_KW = ['hummus','chips','dip','trail mix','granola bar','popcorn','bruschetta','crostini','nuts','guacamole','pretzel','edamame','energy ball','protein ball'];
const DESSERT_KW = ['cake','cookie','brownie','pie','tart','mousse','pudding','ice cream','cheesecake','cupcake','fudge','truffle','meringue','tiramisu','macaron','sorbet','gelato','donut','crumble','cobbler','biscotti','shortbread'];
const DRINK_KW = ['cocktail','smoothie','juice','lemonade','tea','coffee','latte','shake','punch','spritz','margarita','mojito','mocktail'];

const IMP_TO_MET = {
  'cup':{'factor':236.588,'unit':'ml'},'cups':{'factor':236.588,'unit':'ml'},
  'tbsp':{'factor':14.787,'unit':'ml'},'tablespoon':{'factor':14.787,'unit':'ml'},'tablespoons':{'factor':14.787,'unit':'ml'},
  'tsp':{'factor':4.929,'unit':'ml'},'teaspoon':{'factor':4.929,'unit':'ml'},'teaspoons':{'factor':4.929,'unit':'ml'},
  'oz':{'factor':28.3495,'unit':'g'},'ounce':{'factor':28.3495,'unit':'g'},'ounces':{'factor':28.3495,'unit':'g'},
  'lb':{'factor':453.592,'unit':'g'},'lbs':{'factor':453.592,'unit':'g'},'pound':{'factor':453.592,'unit':'g'},'pounds':{'factor':453.592,'unit':'g'},
  'fl oz':{'factor':29.5735,'unit':'ml'},'pt':{'factor':473.176,'unit':'ml'},'pint':{'factor':473.176,'unit':'ml'},'pints':{'factor':473.176,'unit':'ml'},
  'qt':{'factor':946.353,'unit':'ml'},'quart':{'factor':946.353,'unit':'ml'},'quarts':{'factor':946.353,'unit':'ml'},
  'gal':{'factor':3785.41,'unit':'ml'},'gallon':{'factor':3785.41,'unit':'ml'},
  'g':{'factor':1,'unit':'g'},'gram':{'factor':1,'unit':'g'},'grams':{'factor':1,'unit':'g'},
  'kg':{'factor':1000,'unit':'g'},'kilogram':{'factor':1000,'unit':'g'},
  'ml':{'factor':1,'unit':'ml'},'l':{'factor':1000,'unit':'ml'},'liter':{'factor':1000,'unit':'ml'},'liters':{'factor':1000,'unit':'ml'}
};

function classifyRecipe(title, ingredients) {
  const txt = (title + ' ' + ingredients).toLowerCase();
  if (DRINK_KW.some(k => txt.includes(k))) return 'drink';
  if (DESSERT_KW.some(k => txt.includes(k))) return 'dessert';
  if (BREAKFAST_KW.some(k => txt.includes(k))) return 'breakfast';
  if (SNACK_KW.some(k => txt.includes(k))) return 'snack';
  if (LUNCH_KW.some(k => txt.includes(k))) return 'lunch';
  if (DINNER_KW.some(k => txt.includes(k))) return 'dinner';
  return 'dinner';
}

function evalFraction(s) {
  s = s.trim();
  if (s.includes(' ')) {
    const parts = s.split(/\s+/);
    let total = 0;
    for (const p of parts) {
      if (p.includes('/')) { const [a,b] = p.split('/'); total += parseFloat(a)/parseFloat(b); }
      else total += parseFloat(p)||0;
    }
    return total;
  }
  if (s.includes('/')) { const [a,b] = s.split('/'); return parseFloat(a)/parseFloat(b); }
  return parseFloat(s)||null;
}

function parseIngredients(raw) {
  return raw.split('\n').filter(l => l.trim()).map(line => {
    line = line.trim().replace(/^[-•*]\s*/, '');
    const m = line.match(/^([\d\/\s\.\-]+)\s*(cup|cups|tbsp|tablespoon|tablespoons|tsp|teaspoon|teaspoons|oz|ounce|ounces|lb|lbs|pound|pounds|fl oz|pt|pint|pints|qt|quart|quarts|gal|gallon|g|gram|grams|kg|kilogram|ml|l|liter|liters)?\s*(.+)?$/i);
    if (m) {
      const qty = m[1] ? evalFraction(m[1].trim()) : null;
      const unit = m[2] || null;
      const name = m[3] ? m[3].replace(/^,\s*/, '').trim() : line;
      return { qty, unit, name: name||line };
    }
    return { qty: null, unit: null, name: line };
  });
}

function formatQty(qty, unit, scale, metric) {
  if (qty === null) return unit || '';
  let scaledQty = qty * scale;
  let displayUnit = unit || '';
  if (metric && unit) {
    const key = unit.toLowerCase();
    const conv = IMP_TO_MET[key];
    if (conv) {
      scaledQty = scaledQty * conv.factor;
      displayUnit = conv.unit;
      if (scaledQty >= 1000 && displayUnit === 'ml') { scaledQty /= 1000; displayUnit = 'L'; }
      if (scaledQty >= 1000 && displayUnit === 'g') { scaledQty /= 1000; displayUnit = 'kg'; }
    }
  }
  let display;
  if (scaledQty >= 10) display = Math.round(scaledQty).toString();
  else if (scaledQty >= 1) display = parseFloat(scaledQty.toFixed(1)).toString();
  else display = parseFloat(scaledQty.toFixed(2)).toString();
  return displayUnit ? `${display} ${displayUnit}` : display;
}

const db = {
  from: (table) => ({
    select: (cols='*') => ({
      order: (col, opts={}) => ({
        async then(resolve, reject) {
          try {
            const asc = opts.ascending !== false;
            const res = await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&order=${col}.${asc?'asc':'desc'}`, { headers: SB_HEADERS });
            const data = await res.json();
            resolve({ data: Array.isArray(data) ? data : [], error: res.ok ? null : data });
          } catch(e) { resolve({ data: [], error: e }); }
        }
      }),
      eq: (col, val) => ({
        maybeSingle: async () => {
          try {
            const res = await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${encodeURIComponent(val)}&limit=1`, { headers: SB_HEADERS });
            const data = await res.json();
            const row = Array.isArray(data) ? data[0] : null;
            return { data: row || null, error: res.ok ? null : data };
          } catch(e) { return { data: null, error: e }; }
        }
      })
    }),
    upsert: async (row, opts={}) => {
      try {
        const conflict = opts.onConflict ? `?on_conflict=${opts.onConflict}` : '';
        const res = await fetch(`${SB_URL}/rest/v1/${table}${conflict}`, {
          method: 'POST',
          headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation' },
          body: JSON.stringify(row)
        });
        const data = await res.json();
        return { data, error: res.ok ? null : data };
      } catch(e) { return { data: null, error: e }; }
    },
    delete: () => ({
      eq: async (col, val) => {
        try {
          const res = await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`, {
            method: 'DELETE', headers: SB_HEADERS
          });
          return { error: res.ok ? null : await res.json() };
        } catch(e) { return { error: e }; }
      }
    })
  })
};

function setFilter(key, val) {
  // Toggle off if already active, except search and meal=all
  if (key === 'search') { activeFilters.search = val; }
  else if (key === 'meal') { activeFilters.meal = val; }
  else { activeFilters[key] = activeFilters[key] === val ? null : val; }
  renderFilters();
  renderGrid();
}

function applyFilters(list) {
  return list.filter(r => {
    if (activeFilters.meal !== 'all' && r.category !== activeFilters.meal) return false;
    if (activeFilters.cuisine && r.cuisine !== activeFilters.cuisine) return false;
    if (activeFilters.method && !(r.method||[]).includes(activeFilters.method)) return false;
    if (activeFilters.time) {
      const t = TIMES.find(t => t.label === activeFilters.time);
      if (t && r.totalTime) {
        if (t.max && r.totalTime > t.max) return false;
        if (t.min && r.totalTime < t.min) return false;
      }
    }
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      if (!r.title.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

async function planThisWeek(recipeId, slotKey) {
  planPopoverOpen = null;
  // Load or init current week plan
  const sunday = getSundayStr();
  const { data } = await db.from('meal_plans').select('*').eq('week_start', sunday).maybeSingle();
  const plan = (data?.plan && Object.keys(data.plan).length) ? data.plan : emptyPlan();
  plan[slotKey].mainId = recipeId;
  await db.from('meal_plans').upsert({
    week_start: sunday,
    lunches: [],
    dinners: [],
    plan,
    updated_at: new Date().toISOString()
  }, { onConflict: 'week_start' });
  // Update local badge state
  currentWeekPlan[slotKey] = recipeId;
  // Sync to planner if open
  if (showPlanner) {
    plannerPlan = plan;
    plannerWeekStart = sunday;
    renderPlanner();
  }
  renderGrid();
}

async function commitPlan() {
  const now = new Date().toISOString();
  const weekStart = plannerWeekStart;
  // Save committed state
  await db.from('meal_plans').upsert({
    week_start: weekStart,
    lunches: [],
    dinners: [],
    plan: plannerPlan,
    committed: true,
    committed_at: now,
    updated_at: now
  }, { onConflict: 'week_start' });
  plannerPlan._committed = true;
  plannerPlan._committedAt = now;
  // Auto-log cook date on each recipe in the plan
  const cookDate = new Date(weekStart + 'T00:00:00').toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
  const recipeIds = [
    plannerPlan.lunch?.mainId,
    plannerPlan.lunch?.sideId,
    plannerPlan.dinner?.mainId,
    plannerPlan.dinner?.sideId,
    ...(plannerPlan.kidsLunch?.enabled ? [plannerPlan.kidsLunch?.mainId, plannerPlan.kidsLunch?.sideId] : [])
  ].filter(Boolean);
  const uniqueIds = [...new Set(recipeIds)];
  for (const id of uniqueIds) {
    const r = recipes.find(rec => rec.id === id);
    if (!r) continue;
    if (!r.cookedDates) r.cookedDates = [];
    if (!r.cookedDates.includes(cookDate)) {
      r.cookedDates.push(cookDate);
      await save(r);
    }
  }
  renderPlanner();
  renderGrid();
}

async function uncommitPlan() {
  const now = new Date().toISOString();
  await db.from('meal_plans').upsert({
    week_start: plannerWeekStart,
    lunches: [],
    dinners: [],
    plan: plannerPlan,
    committed: false,
    committed_at: null,
    updated_at: now
  }, { onConflict: 'week_start' });
  plannerPlan._committed = false;
  plannerPlan._committedAt = null;
  renderPlanner();
}

}

function renderInstructions(instructions) {
  let html = '';
  let stepNum = 0;
  let lastGroup = null;
  instructions.forEach(step => {
    const text = typeof step === 'string' ? step : step.text;
    const g = (typeof step === 'object' && step.group) ? step.group : null;
    if (g && g !== lastGroup) {
      html += `<li style="padding:0;border:none;display:block"><span class="ing-group-label">${escHtml(g)}</span></li>`;
      lastGroup = g;
    }
    stepNum++;
    html += `<li><span class="step-num">${stepNum}</span><span>${escHtml(text)}</span></li>`;
  });
  return html;
}

function renderIngredients(ingredients, scale, metric) {
  let html = '';
  let lastGroup = null;
  ingredients.forEach(ing => {
    const g = ing.group || null;
    if (g && g !== lastGroup) {
      html += `<li style="padding:0;border:none"><span class="ing-group-label">${escHtml(g)}</span></li>`;
      lastGroup = g;
    }
    const amt = ing.qty !== null ? escHtml(formatQty(ing.qty, ing.unit, scale, metric)) : (ing.unit || 'to taste');
    html += `<li><span class="ing-name">${escHtml(ing.name)}</span><span class="ing-amt">${amt}</span></li>`;
  });
  return html;
}

function assignSection(name) {
  const lower = name.toLowerCase();
  // 1. Check exact phrases first (handles compound ingredients)
  for (const ep of EXACT_PHRASES) {
    if (ep.phrases.some(p => lower.includes(p))) return ep.label;
  }
  // 2. Fall through to general section keywords
  for (const section of STORE_SECTIONS) {
    if (section.keys.some(k => lower.includes(k))) return section.label;
  }
  return 'Other';
}

// Maps lowercase ingredient name keywords to conversion functions
// qty is in the recipe unit (cups, tbsp, etc.)
const PRODUCE_CONVERSIONS = [
  // Vegetables
  { match: ['carrot','carrots'],          cups_per_unit: 0.5,   unit: 'medium carrot' },
  { match: ['celery','celery stalk','ribs celery'], cups_per_unit: 0.5, unit: 'stalk celery' },
  { match: ['onion','yellow onion','white onion','red onion'], cups_per_unit: 1.5, unit: 'medium onion' },
  { match: ['green onion','scallion'],    cups_per_unit: 0.125, unit: 'green onion' },
  { match: ['garlic clove','cloves garlic','clove garlic'], each: true, unit: 'clove garlic' },
  { match: ['bell pepper','green pepper','red pepper'], cups_per_unit: 1.0, unit: 'medium pepper' },
  { match: ['mushroom'],                  cups_per_unit: 0.75,  unit: 'oz mushrooms', oz_per_cup: 2.8 },
  { match: ['cauliflower floret','cauliflower'], cups_per_unit: null, whole: '1 medium head = ~6 cups florets', unit: 'head cauliflower' },
  { match: ['zucchini'],                  cups_per_unit: 1.0,   unit: 'medium zucchini' },
  { match: ['potato','potatoes'],         cups_per_unit: 1.5,   unit: 'medium potato' },
  { match: ['sweet potato'],              cups_per_unit: 1.25,  unit: 'medium sweet potato' },
  { match: ['broccoli'],                  cups_per_unit: null,  whole: '1 head = ~3 cups', unit: 'head broccoli' },
  { match: ['spinach'],                   cups_per_unit: 1.0,   unit: 'oz spinach', oz_per_cup: 1.0 },
  { match: ['kale'],                      cups_per_unit: null,  whole: '1 bunch = ~4 cups', unit: 'bunch kale' },
  { match: ['cucumber'],                  cups_per_unit: 1.5,   unit: 'medium cucumber' },
  { match: ['tomato'],                    cups_per_unit: 0.75,  unit: 'medium tomato' },
  // Fruits & herbs
  { match: ['lemon'],                     each: true,           unit: 'lemon' },
  { match: ['lime'],                      each: true,           unit: 'lime' },
  { match: ['avocado'],                   each: true,           unit: 'avocado' },
  { match: ['ginger','fresh ginger'],     cups_per_unit: null,  tbsp_per_inch: 1, unit: 'inch piece ginger' },
  { match: ['cilantro'],                  cups_per_unit: null,  whole: '1 bunch', unit: 'bunch cilantro' },
  { match: ['green chile','chile pepper'], each: true,          unit: 'green chile' },
];

function getProduceHint(name, qty, unit) {
  const lower = name.toLowerCase();
  const conv = PRODUCE_CONVERSIONS.find(c => c.match.some(m => lower.includes(m)));
  if (!conv) return null;

  // If ingredient is already counted (e.g. "4 cloves garlic", "2 stalks celery")
  if (conv.each || unit === null) {
    // qty is already the count
    if (qty === null) return null;
    const count = Math.ceil(qty);
    return `~${count} ${count === 1 ? conv.unit : conv.unit + 's'}`;
  }

  if (qty === null) return conv.whole || null;

  // Convert qty to cups first
  let cups = qty;
  if (unit === 'tbsp') cups = qty / 16;
  else if (unit === 'tsp') cups = qty / 48;
  else if (unit === 'oz') cups = qty / 8;
  else if (unit === 'l') cups = qty * 4.23;
  else if (unit === 'ml') cups = qty / 237;

  if (conv.whole) return conv.whole;
  if (conv.oz_per_cup) {
    const oz = Math.ceil(cups * conv.oz_per_cup * 10) / 10;
    return `~${oz} oz`;
  }
  if (conv.tbsp_per_inch) {
    const inches = Math.ceil(cups * 16 / conv.tbsp_per_inch);
    return `~${inches}-inch piece`;
  }
  if (conv.cups_per_unit) {
    const count = cups / conv.cups_per_unit;
    const rounded = count < 1 ? Math.ceil(count * 4) / 4 : Math.ceil(count * 2) / 2;
    if (rounded <= 0) return null;
    return `~${rounded % 1 === 0 ? rounded : rounded.toFixed(1)} ${rounded === 1 ? conv.unit : conv.unit + 's'}`;
  }
  return null;
}

  const lower = name.toLowerCase().replace(/[,().]/g,'');

    return words.includes(skip) || lower === skip || lower.startsWith(skip + ' ') || lower.endsWith(' ' + skip);

}

// ── Ingredient name normalization for shopping list combining ──
const PREP_STRIP = [
  // Prep verbs
  'cubed','diced','minced','chopped','sliced','shredded','grated','pressed',
  'crumbled','mashed','roasted','toasted','cooked','halved','quartered',
  'trimmed','peeled','seeded','pitted','torn','julienned','roughly','finely',
  'thinly','patted','drained','rinsed','softened','thawed','blanched',
  'sauteed','sautéed','caramelized','pureed','puréed','ground','crushed',
  'dry','dried','and','or',
  // Quantity nouns that sneak into names
  'block','bunch','head','stalk','rib','sprig','clove','piece','slice',
  'wedge','leaf','leaves','knob','handful','pinch',
];

// Words that ARE meaningful and should not be stripped
const KEEP_QUALIFIERS = [
  'extra-firm','firm','medium-firm','silken','soft',  // tofu types
  'frozen','fresh','canned','dried',                   // state (product spec)
  'unsweetened','sweetened','low sodium','light',      // product spec
  'basmati','brown','white','wild','jasmine',          // rice types
  'cremini','portobello','shiitake',                   // mushroom types
  'red','yellow','white','green','black',              // color qualifiers (e.g. red onion)
  'baby','mini','large','medium','small',              // size when meaningful
];

function normalizeIngKey(name) {
  // 1. Strip parentheticals
  let n = name.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
  // 2. Everything after first comma is prep notes — drop it
  n = n.split(',')[0].trim();
  // 3. Strip prep words, but only standalone words (not parts of compound words)
  const words = n.split(/\s+/);
  const filtered = words.filter(w => {
    const lw = w.toLowerCase().replace(/[^a-z-]/g,'');
    // Keep if it's a meaningful qualifier
    if (KEEP_QUALIFIERS.some(k => lw === k || lw.startsWith(k))) return true;
    // Drop pure prep/quantity words
    if (PREP_STRIP.includes(lw)) return false;
    return true;
  });
  return filtered.join(' ').trim().toLowerCase();
}

function cleanDisplayName(name) {
  // Same as normalizeIngKey but returns properly cased version
  let n = name.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
  n = n.split(',')[0].trim();
  const words = n.split(/\s+/);
  const filtered = words.filter(w => {
    const lw = w.toLowerCase().replace(/[^a-z-]/g,'');
    if (KEEP_QUALIFIERS.some(k => lw === k || lw.startsWith(k))) return true;
    if (PREP_STRIP.includes(lw)) return false;
    return true;
  });
  return filtered.join(' ').trim();
}

function openShoppingList(id) {
  const r = recipes.find(rec => rec.id === id);
  if (!r) return;
  const scale = r._scale || 1;
  const metric = r._metric || false;

  // Combine like ingredients by normalized name
  const combined = {};
  r.ingredients.forEach(ing => {
    if (shouldSkipIngredient(ing.name)) return;
    const key = normalizeIngKey(ing.name);
    if (!key) return;
    if (!combined[key]) combined[key] = { name: cleanDisplayName(ing.name), entries: [] };
    if (ing.qty !== null) combined[key].entries.push({ qty: ing.qty * scale, unit: ing.unit, metric });
    else combined[key].entries.push({ qty: null, unit: ing.unit, metric });
  });

  // Group by store section
  const sections = {};
  Object.values(combined).forEach(item => {
    const sec = assignSection(item.name);
    if (!sections[sec]) sections[sec] = [];
    // Format combined qty: if multiple entries with same unit, sum them
    let display = '';
    if (item.entries.length === 1) {
      const e = item.entries[0];
      display = e.qty !== null ? formatQty(e.qty, e.unit, 1, e.metric) : (e.unit || 'to taste');
    } else {
      // Group by unit
      const byUnit = {};
      item.entries.forEach(e => {
        if (e.qty === null) return;
        const u = e.unit || '';
        byUnit[u] = (byUnit[u] || 0) + e.qty;
      });
      const parts = Object.entries(byUnit).map(([u, q]) => formatQty(q, u || null, 1, metric));
      display = parts.join(' + ');
    }
    const produceHint = sec === 'Fresh Produce' ? getProduceHint(item.name, item.entries[0]?.qty ?? null, item.entries[0]?.unit ?? null) : null;
    const packageHint = sec !== 'Fresh Produce' ? getPackageHint(item.name) : null;
    const hint = produceHint || packageHint || null;

    dinner:    { mainId: null, sideId: null, people: ['Bret','Sadie','Griffin','Taylor'], meals: 4 }
  };
}
let plannerPlan = emptyPlan();

function getSundayStr(offset=0) {
  const d = new Date();
  // If today is Sunday (0), use today. Otherwise advance to next Sunday.
  const daysUntilSunday = d.getDay() === 0 ? 0 : 7 - d.getDay();
  d.setDate(d.getDate() + daysUntilSunday + offset * 7);
  return d.toISOString().split('T')[0];
}

function getThisSundayStr() {
  // Always returns the most recent Sunday (for "This week" button)
  const d = new Date();
  d.setDate(d.getDate() - (d.getDay() % 7));
  return d.toISOString().split('T')[0];
}

function weekLabel(str) {
  const d = new Date(str + 'T00:00:00');
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `Week of ${fmt(d)} \u2013 ${fmt(end)}`;
}

function normalizePlan(data) {
  const plan = emptyPlan();
  if (!data) return plan;
  // Support both old array format and new object format
  const raw = (data.lunches && Array.isArray(data.lunches)) ? null : data.plan;
  if (raw) {
    ['lunch','kidsLunch','dinner'].forEach(key => {
      if (raw[key]) Object.assign(plan[key], raw[key]);
    });
  }
  return plan;
}

async function openPlanner() {

  const { data } = await db.from('meal_plans').select('*').eq('week_start', plannerWeekStart).maybeSingle();
  plannerPlan = normalizePlan(data);
  plannerPlan._committed = data?.committed || false;
  plannerPlan._committedAt = data?.committed_at || null;
  renderPlanner();
}

async function shiftPlannerWeek(dir) {
  if (dir === 0) { plannerWeekStart = getSundayStr(0); } // Next/current Sunday
  else {
    const d = new Date(plannerWeekStart + 'T00:00:00');
    d.setDate(d.getDate() + dir * 7);
    plannerWeekStart = d.toISOString().split('T')[0];
  }
  plannerPlan = emptyPlan();
  const { data } = await db.from('meal_plans').select('*').eq('week_start', plannerWeekStart).maybeSingle();
  plannerPlan = normalizePlan(data);
  plannerPlan._committed = data?.committed || false;
  plannerPlan._committedAt = data?.committed_at || null;
  renderPlanner();
}

async function savePlan() {
  await db.from('meal_plans').upsert({
    week_start: plannerWeekStart,
    lunches: [],   // kept for schema compat

    updated_at: new Date().toISOString()
  }, { onConflict: 'week_start' });
}

async function copyPlanForward() {
  // Copy current viewed week plan to the next week
  const d = new Date(plannerWeekStart + 'T00:00:00');
  d.setDate(d.getDate() + 7);
  const nextWeek = d.toISOString().split('T')[0];
  const nextPlan = JSON.parse(JSON.stringify(plannerPlan)); // deep clone
  await db.from('meal_plans').upsert({
    week_start: nextWeek,
    lunches: [],
    dinners: [],
    plan: nextPlan,
    updated_at: new Date().toISOString()
  }, { onConflict: 'week_start' });
  // Navigate to next week
  plannerWeekStart = nextWeek;
  plannerPlan = nextPlan;
  renderPlanner();
}

function getScaleForSlot(slot, mealKey) {
  // Returns { recipeId -> scale } for main and side
  const result = {};
  const hasSide = slot.mainId && slot.sideId;
  [[slot.mainId, hasSide ? 0.65 : 1.0], [slot.sideId, 0.35]].forEach(([id, fraction]) => {
    if (!id) return;
    const r = recipes.find(rec => rec.id === id);
    if (!r) return;
    let scale;
    if (r.nutrition && r.nutrition.calories) {
      const totalCal = slot.people.reduce((s, p) => s + (FAMILY[p]?.[mealKey] || 550), 0) * slot.meals * fraction;
      scale = totalCal / r.nutrition.calories / r.baseServings;
    } else {
      scale = (slot.people.length * slot.meals * fraction) / r.baseServings;
    }
    result[id] = (result[id] || 0) + scale;
  });
  return result;
}

function buildWeeklyShopList() {
  const slots = [
    { slot: plannerPlan.lunch, mealKey: 'lunch' },
    ...(plannerPlan.kidsLunch.enabled ? [{ slot: plannerPlan.kidsLunch, mealKey: 'lunch' }] : []),
    { slot: plannerPlan.dinner, mealKey: 'dinner' }
  ];
  if (!slots.some(s => s.slot.mainId)) { alert('Add some meals to the plan first.'); return; }

  // Accumulate scales
  const scales = {};
  slots.forEach(({ slot, mealKey }) => {
    Object.entries(getScaleForSlot(slot, mealKey)).forEach(([id, scale]) => {
      scales[id] = (scales[id] || 0) + scale;
    });
  });

  // Combine ingredients
  const combined = {};
  Object.entries(scales).forEach(([id, scale]) => {
    const r = recipes.find(rec => rec.id === parseInt(id));
    if (!r) return;
    (r.ingredients || []).forEach(ing => {
      if (shouldSkipIngredient(ing.name)) return;
      const key = normalizeIngKey(ing.name);
      if (!key) return;
      if (!combined[key]) combined[key] = { name: cleanDisplayName(ing.name), entries: [] };
      if (ing.qty !== null) combined[key].entries.push({ qty: ing.qty * scale, unit: ing.unit });
      else combined[key].entries.push({ qty: null, unit: ing.unit });
    });
  });

  // Group by store section
  const sections = {};
  Object.values(combined).forEach(item => {
    const sec = assignSection(item.name);
    if (!sections[sec]) sections[sec] = [];
    let display = '';
    if (item.entries.length === 1) {
      const e = item.entries[0];
      display = e.qty !== null ? formatQty(e.qty, e.unit, 1, false) : (e.unit || 'to taste');
    } else {
      const byUnit = {};
      item.entries.forEach(e => { if (e.qty == null) return; const u = e.unit || ''; byUnit[u] = (byUnit[u] || 0) + e.qty; });
      display = Object.entries(byUnit).map(([u, q]) => formatQty(q, u || null, 1, false)).join(' + ') || 'to taste';
    }
    const produceHint = sec === 'Fresh Produce' ? getProduceHint(item.name, item.entries[0]?.qty ?? null, item.entries[0]?.unit ?? null) : null;
    const packageHint = sec !== 'Fresh Produce' ? getPackageHint(item.name) : null;
    const hint = produceHint || packageHint || null;
    sections[sec].push({ name: item.name, display, produceHint: hint });
  });

  // Share text
  let shareText = `WEST FAMILY MEAL PLAN\n${weekLabel(plannerWeekStart)}\n`;
  slots.forEach(({ slot, mealKey }) => {
    if (!slot.mainId) return;
    const main = recipes.find(r => r.id === slot.mainId)?.title || '';
    const side = slot.sideId ? recipes.find(r => r.id === slot.sideId)?.title : null;
    const who = slot.people.join(', ');
    const label = mealKey === 'dinner' ? 'DINNER' : (slot.people.includes('Griffin') ? 'KIDS LUNCH' : 'LUNCH');
    shareText += `\n${label} (${who}, ${slot.meals}\u00d7)\n\u2022 ${main}${side ? ' + ' + side : ''}\n`;
  });
  shareText += '\nSHOPPING LIST\n';
  STORE_SECTIONS.forEach(sec => {
    const items = sections[sec.label];
    if (!items?.length) return;
    shareText += `\n${sec.label.toUpperCase()}\n` + items.map(i => `\u2022 ${i.name}${i.display ? ' \u2014 ' + i.display : ''}${i.produceHint ? ' / ' + i.produceHint : ''}`).join('\n') + '\n';
  });

  // Render
  let listHtml = '';
  STORE_SECTIONS.forEach(sec => {
    const items = sections[sec.label];
    if (!items?.length) return;
    listHtml += `<div class="plan-shop-section">${sec.label}</div><ul class="plan-shop-items">`;
    items.forEach(i => {
      const hint = i.produceHint ? `<span style="color:var(--text-faint);font-size:11px"> / ${escHtml(i.produceHint)}</span>` : '';
      listHtml += `<li><span>${escHtml(i.name)}</span><span style="color:var(--text-faint)">${escHtml(i.display)}${hint}</span></li>`;
    });
    listHtml += '</ul>';
  });

  const shareTextEsc = JSON.stringify(shareText).replace(/</g, '\u003c');
  document.getElementById('planner-shop').innerHTML = `
    <div class="plan-shop-list">
      <div class="plan-shop-title">
        <span>Shopping List</span>
        <button class="btn" onclick="shareToNotes(${shareTextEsc})"><i class="ti ti-share"></i> Share to Notes</button>
      </div>
      ${listHtml}
    </div>`;
}

async function shareToNotes(text) {
  if (navigator.share) {
    try { await navigator.share({ title: 'West Family Meal Plan', text }); } catch(e) {}
  } else {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard \u2014 paste into Notes.');
  }
}


function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
